services:
  - type: web
    name: customer-bot-21
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CUSTOMER_BOT_TOKEN
        sync: false
      - key: CUSTOMER_ADMIN_ID
        sync: false
      - key: BALE_BOT_TOKEN
        sync: false
      - key: BALE_ADMIN_ID
        sync: false
      - key: BALE_BOT_USERNAME
        sync: false
      - key: BALE_ADMIN_SETUP_KEY
        sync: false
      - key: BALE_WEBHOOK_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: PAYMENT_LINK
        sync: false
      - key: CARD_NUMBER
        sync: false
      - key: CARD_HOLDER
        sync: false
      - key: ZARINPAL_MERCHANT_ID
        sync: false
      - key: ZARINPAL_SANDBOX
        value: "false"
      - key: SETTINGS_FILE
        value: "./data/settings.json"
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_VERIFY_TOKEN
        sync: false
      - key: INSTAGRAM_GRAPH_VERSION
        value: "v20.0"
      - key: INSTAGRAM_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
